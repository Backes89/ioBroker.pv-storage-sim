name: Test and Release

on:
  push:
    branches: [main]
    tags:
      # normale Versionen
      - "v[0-9]+.[0-9]+.[0-9]+"
      # Pre-Releases
      - "v[0-9]+.[0-9]+.[0-9]+-**"
  pull_request: {}

# Bei schnell aufeinanderfolgenden Pushes den veralteten Lauf abbrechen
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Schnelle Vorab-Checks: Lint, Typecheck und offizielle Paketvalidierung
  check-and-lint:
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20.x'
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Typecheck (tsc --noEmit, checkJs)
        run: npm run check
      - name: Offizielle Paketvalidierung (@iobroker/testing)
        run: npm run test:package

  # Unit- und Integrationstests auf allen unterstützten Node-Versionen
  adapter-tests:
    if: contains(github.event.head_commit.message, '[skip ci]') == false
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20.x', '22.x', '24.x']
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - name: Unit-Tests (node:test)
        run: npm run test:unit
      - name: Integrationstest (@iobroker/testing, js-controller latest)
        run: npm run test:integration

  repochecker:
    # Informativ: prüft den GitHub-Stand gegen die Regeln des offiziellen ioBroker-Repos.
    # continue-on-error, weil der Checker den bereits gepushten Stand prüft (Race bei PRs)
    # und Punkte enthält, die erst zur Veröffentlichung relevant sind.
    name: ioBroker Repo-Checker (informativ)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: '20.x'
      - run: npx --yes @iobroker/repochecker https://github.com/Backes89/ioBroker.pv-storage-sim

  # Hinweis: Der "deploy"-Job (automatisches npm-Publish + GitHub-Release bei Versions-Tags)
  # folgt zusammen mit der npm-Veröffentlichung (benötigt NPM_TOKEN-Secret).
