<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PV-Speicher-Simulation – Auswertung</title>
    <!-- socket.io-Client wird vom Admin selbst ausgeliefert (kein externes CDN) -->
    <script src="../../socket.io/socket.io.js"></script>
    <style>
        :root { --bg:#fafafa; --card:#fff; --fg:#222; --muted:#777; --border:#e2e2e2; --accent:#4caf50; --hl:rgba(76,175,80,0.18); }
        @media (prefers-color-scheme: dark) {
            :root { --bg:#1e1e1e; --card:#2a2a2a; --fg:#eee; --muted:#aaa; --border:#444; --hl:rgba(76,175,80,0.25); }
        }
        * { box-sizing: border-box; }
        body { margin:0; font-family:'Segoe UI',Roboto,Arial,sans-serif; background:var(--bg); color:var(--fg); }
        .wrap { padding:14px 22px; max-width:none; margin:0; }
        .bar { display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:10px; }
        .bar h2 { margin:0; font-size:18px; font-weight:600; }
        .bar .spacer { flex:1; }
        select, input[type=date], button {
            background:var(--card); color:var(--fg); border:1px solid var(--border);
            border-radius:6px; padding:6px 9px; font-size:14px;
        }
        button { cursor:pointer; }
        button:hover { border-color:var(--accent); }
        button.nav { padding:6px 8px; margin:0 2px; }
        input[type=date] { vertical-align:middle; }
        .status { font-size:13px; color:var(--muted); margin:2px 0 10px; min-height:18px; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; }
        .main { display:flex; gap:14px; align-items:stretch; }
        .chart-card { flex:1 1 0; min-width:0; }
        .table-card { flex:0 0 500px; max-width:500px; padding:0; display:flex; flex-direction:column; }
        @media (max-width:900px) { .main { flex-direction:column; } .table-card { flex-basis:auto; max-width:none; } }
        .chart-wrap { position:relative; width:100%; height:600px; }
        .chart-wrap canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }
        #cross { pointer-events:none; }
        .legend { display:flex; gap:16px; flex-wrap:wrap; margin-top:10px; font-size:13px; color:var(--muted); }
        .legend span.leg { display:inline-flex; align-items:center; gap:6px; cursor:pointer; user-select:none; }
        .legend span.leg.off { opacity:0.4; text-decoration:line-through; }
        .swatch { width:14px; height:14px; border-radius:3px; display:inline-block; }
        .overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
            text-align:center; color:var(--muted); font-size:14px; padding:20px; pointer-events:none; }
        .tip { position:absolute; pointer-events:none; background:var(--card); border:1px solid var(--border);
            border-radius:8px; padding:8px 10px; font-size:12px; box-shadow:0 4px 14px rgba(0,0,0,0.25);
            display:none; z-index:5; white-space:nowrap; }
        .tip .t-time { font-weight:600; margin-bottom:4px; }
        .tip .t-row { display:flex; align-items:center; gap:6px; }
        .tbl-head { padding:12px 14px 8px; font-size:13px; color:var(--muted); border-bottom:1px solid var(--border); }
        .tbl-scroll { overflow:auto; flex:1; max-height:640px; }
        table { width:100%; border-collapse:collapse; font-size:12.5px; }
        thead th { position:sticky; top:0; background:var(--card); color:var(--muted); font-weight:600;
            text-align:right; padding:7px 10px; border-bottom:1px solid var(--border); }
        thead th:first-child { text-align:left; }
        tbody td { text-align:right; padding:5px 10px; border-bottom:1px solid var(--border); }
        tbody td:first-child { text-align:left; color:var(--muted); }
        tbody tr.hl { background:var(--hl); }
        tbody tr.hl td:first-child { color:var(--fg); font-weight:600; }
        .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-top:14px; }
        .kpi { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:12px 14px; }
        .kpi .label { font-size:12px; color:var(--muted); }
        .kpi .value { font-size:22px; font-weight:600; margin-top:2px; }
        .kpi .sub { font-size:12px; color:var(--muted); margin-top:2px; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="bar">
        <h2>☀️🔋 PV-Speicher-Auswertung</h2>
        <div class="spacer"></div>
        <label>Zeitraum <select id="period">
            <option value="tag">Tag</option>
            <option value="monat">Monat (Ersparnis/Tag)</option>
            <option value="prognose">Prognose</option>
        </select></label>
        <label id="viewWrap">Ansicht <select id="view">
            <option value="vergleich">Vergleich (beide)</option>
            <option value="mit">Mit Speicher</option>
            <option value="ohne">Ohne Speicher</option>
        </select></label>
        <label id="smoothWrap" title="Seichte Glättung der Chart-Kurven (Tabelle bleibt exakt)"><input type="checkbox" id="smooth"> Glättung</label>
        <label>Instanz <select id="instance"></select></label>
        <label id="dayWrap">Tag <button id="dayPrev" class="nav" title="Tag zurück">◀</button><input type="date" id="day"><button id="dayNext" class="nav" title="Tag vor">▶</button><button id="dayToday" class="nav">Heute</button></label>
        <button id="reload">Aktualisieren</button>
    </div>
    <div class="status" id="status">Verbinde…</div>

    <div class="main">
        <div class="card chart-card">
            <div class="chart-wrap">
                <canvas id="chart"></canvas>
                <canvas id="cross"></canvas>
                <div class="overlay" id="overlay"></div>
                <div class="tip" id="tip"></div>
            </div>
            <div class="legend" id="legend"></div>
        </div>
        <div class="card table-card">
            <div class="tbl-head"><span id="tblTitle">Werte über den Tag</span> <span id="tblInfo" style="float:right"></span></div>
            <div class="tbl-scroll"><table id="tbl"><thead></thead><tbody></tbody></table></div>
        </div>
    </div>

    <div class="kpis" id="kpis"></div>
</div>

<script>
'use strict';

var socket = null, instances = [], curInst = 0, sourceMode = 'pv_consumption';
var curCfg = null, merged = [], tableRows = [], geom = null, hiddenSet = {};
var periodMode = 'tag', capacityKwh = 10, smoothOn = false;
var wrap, crossCanvas, tipEl;

function isHidden(s) { return !!hiddenSet[s.path]; }

// Seichte Glättung (zentrierter gleitender Mittelwert) – nur für die Chart-Darstellung.
function smoothData(data, win) {
    if (!data || data.length < 3 || win < 2) return data;
    var half = Math.floor(win / 2), out = [];
    for (var i = 0; i < data.length; i++) {
        var sum = 0, cnt = 0;
        for (var j = Math.max(0, i - half); j <= Math.min(data.length - 1, i + half); j++) { sum += data[j].val; cnt++; }
        out.push({ ts: data[i].ts, val: sum / cnt });
    }
    return out;
}

function setStatus(t) { document.getElementById('status').textContent = t; }

function emitP(cmd, args) {
    return new Promise(function (resolve, reject) {
        if (!socket || !socket.connected) { reject(new Error('keine Verbindung')); return; }
        socket.emit.apply(socket, [cmd].concat(args, [function (err, res) { err ? reject(err) : resolve(res); }]));
    });
}

function connect() {
    try { socket = io.connect(location.protocol + '//' + location.host, { path: '/socket.io' }); }
    catch (e) { setStatus('Socket-Verbindung fehlgeschlagen: ' + e.message); return; }
    socket.on('connect', function () { setStatus('Verbunden. Lade Instanzen…'); loadInstances(); });
    socket.on('disconnect', function () { setStatus('Verbindung getrennt.'); });
    socket.on('connect_error', function (e) { setStatus('Verbindungsfehler: ' + (e && e.message || e)); });
}

function loadInstances() {
    emitP('getObjectView', ['system', 'instance', {
        startkey: 'system.adapter.pv-storage-sim.', endkey: 'system.adapter.pv-storage-sim.香'
    }]).then(function (res) {
        instances = (res && res.rows || []).map(function (r) { return parseInt(String(r.id).split('.').pop(), 10); })
            .filter(function (n) { return !isNaN(n); });
        if (!instances.length) instances = [0];
        var sel = document.getElementById('instance');
        sel.innerHTML = instances.map(function (n) { return '<option value="' + n + '">pv-storage-sim.' + n + '</option>'; }).join('');
        curInst = instances[0]; sel.value = curInst; refresh();
    }).catch(function (e) {
        instances = [0]; curInst = 0;
        document.getElementById('instance').innerHTML = '<option value="0">pv-storage-sim.0</option>';
        setStatus('Instanzliste nicht abrufbar (' + e.message + ') – nutze .0'); refresh();
    });
}

function dayBounds() {
    var v = document.getElementById('day').value;
    var d = v ? new Date(v + 'T00:00:00') : new Date();
    var start = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 0, 0, 0, 0).getTime();
    return { start: start, end: start + 24 * 3600 * 1000 };
}

function id(path) { return 'pv-storage-sim.' + curInst + '.' + path; }

function getHistory(path, start, end, opts) {
    var o = { start: start, end: end, count: 300, aggregate: 'average', ignoreNull: true };
    if (opts) for (var k in opts) o[k] = opts[k];
    return emitP('getHistory', [id(path), o])
        .then(function (res) {
            var arr = res && res.result ? res.result : res;
            return (arr || []).filter(function (p) { return p && p.val !== null && typeof p.val === 'number'; });
        }).catch(function () { return []; });
}

function getStateVal(path) {
    return emitP('getState', [id(path)]).then(function (s) { return s && typeof s.val === 'number' ? s.val : null; })
        .catch(function () { return null; });
}

function seriesConfig() {
    if (sourceMode === 'pv_consumption') {
        return {
            areas: [
                { path: 'live.pvW', name: 'Erzeugung', short: 'PV', unit: 'W', scen: 'both', color: 'rgba(244,196,48,0.55)', stroke: '#e0a800' },
                { path: 'live.directUseW', name: 'Direktverbrauch', short: 'Direkt', unit: 'W', scen: 'both', color: 'rgba(77,182,217,0.55)', stroke: '#3aa0c0' }
            ],
            lines: [
                { path: 'live.consumptionW', name: 'Verbrauch', short: 'Verbr.', unit: 'W', scen: 'both', color: '#7a7a1f', axis: 'left' },
                { path: 'live.batteryPowerW', name: 'Speicher (+lädt/−entlädt)', short: 'Speicher', unit: 'W', scen: 'sim', color: '#ff9800', axis: 'left' },
                { path: 'battery.soc.percent', name: 'Ladestand', short: 'SoC', unit: '%', scen: 'sim', color: '#4caf50', axis: 'right' }
            ]
        };
    }
    return {
        areas: [
            { path: 'live.gridNetOrigW', name: 'Netz ohne Speicher (+Bezug/−Einsp.)', short: 'Netz o.Sp.', unit: 'W', scen: 'orig', splitSign: true,
                posColor: 'rgba(229,115,115,0.30)', posStroke: '#d98b8b', negColor: 'rgba(120,170,220,0.30)', negStroke: '#9bbce0' },
            { path: 'live.gridNetSimW', name: 'Netz mit Speicher (+Bezug/−Einsp.)', short: 'Netz m.Sp.', unit: 'W', scen: 'sim', splitSign: true,
                posColor: 'rgba(211,47,47,0.55)', posStroke: '#c62828', negColor: 'rgba(33,110,200,0.50)', negStroke: '#1f6ec8' }
        ],
        lines: [
            { path: 'live.batteryPowerW', name: 'Speicher (+lädt/−entlädt)', short: 'Speicher', unit: 'W', scen: 'sim', color: '#ff9800', axis: 'left' },
            { path: 'battery.soc.percent', name: 'Ladestand', short: 'SoC', unit: '%', scen: 'sim', color: '#4caf50', axis: 'right' }
        ]
    };
}

var refreshTimer = null, investmentEur = 0;

function fetchConfig() {
    return emitP('getObject', ['system.adapter.pv-storage-sim.' + curInst]).then(function (obj) {
        var n = obj && obj.native || {};
        sourceMode = n.sourceMode || 'pv_consumption';
        capacityKwh = Number(n.capacityKwh) || 10;
        investmentEur = Number(n.investmentEur) || 0;
    }).catch(function () { sourceMode = 'pv_consumption'; });
}

function setPeriodUI() {
    document.getElementById('viewWrap').style.display = (periodMode === 'tag') ? '' : 'none';
    document.getElementById('smoothWrap').style.display = (periodMode === 'tag') ? '' : 'none';
    document.getElementById('dayWrap').style.display = (periodMode === 'prognose') ? 'none' : '';
    document.getElementById('legend').style.display = (periodMode === 'tag') ? '' : 'none';
    var titles = { tag: 'Werte über den Tag', monat: 'Ersparnis je Tag', prognose: 'Prognose je Jahr' };
    document.getElementById('tblTitle').textContent = titles[periodMode] || '';
}

function refresh() {
    setPeriodUI();
    if (periodMode === 'monat') return refreshMonth();
    if (periodMode === 'prognose') return refreshForecast();
    return refreshDay();
}

function refreshDay() {
    var b = dayBounds();
    var queryEnd = Math.min(b.end, Date.now());
    setStatus('Lade Daten…');
    fetchConfig().then(function () {
        var cfg = seriesConfig();
        var all = cfg.areas.concat(cfg.lines);
        // Rohwerte (keine Mittelung): Momentanwerte -> Bezug und Einspeisung schliessen sich gegenseitig aus
        return Promise.all(all.map(function (s) {
            return getHistory(s.path, b.start, queryEnd, { aggregate: 'none', count: 3000 }).then(function (data) { s.data = data; return s; });
        })).then(function () { return cfg; });
    }).then(function (cfg) {
        curCfg = cfg;
        merged = buildMerged(cfg);
        drawChart(cfg, b.start, b.end);
        renderLegend(cfg);
        renderTable(cfg, merged);
        if (!merged.length) {
            showOverlay('Noch keine Verlaufsdaten. Bitte History-Logging (history/sql/influxdb) auf den live.*-Datenpunkten und battery.soc.percent aktivieren – danach füllt sich der Chart.');
            setStatus('Keine Historie gefunden.');
        } else {
            showOverlay(''); setStatus('Stand: ' + new Date().toLocaleTimeString());
        }
        return loadKpis();
    }).catch(function (e) { setStatus('Fehler: ' + (e && e.message || e)); });
}

// ---- Monatsansicht: Ersparnis je Tag ------------------------------------------------------
function refreshMonth() {
    var nDays = 30;
    var sel = document.getElementById('day').value;
    var d = sel ? new Date(sel + 'T00:00:00') : new Date();
    var endDay = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 0, 0, 0, 0).getTime() + 86400000;
    var startDay = endDay - nDays * 86400000;
    setStatus('Lade Monatsdaten…');
    fetchConfig().then(function () {
        return getHistory('economics.savingsTotal.eur', startDay - 86400000, Math.min(endDay, Date.now()));
    }).then(function (points) {
        var daily = computeDaily(points, startDay, nDays);
        drawBars(daily, startDay);
        renderRows(['Datum', 'Ersparnis €', 'kumuliert €'], daily.map(function (x) {
            return [ddmm(x.day), fmt(x.val, 2, ''), fmt(x.cum, 2, '')];
        }), true);
        showOverlay(points.length ? '' : 'Noch keine Tagesdaten. Bitte History-Logging auf economics.savingsTotal.eur aktivieren – dann erscheint hier die tägliche Ersparnis.');
        setStatus('Stand: ' + new Date().toLocaleTimeString());
        return loadKpis();
    }).catch(function (e) { setStatus('Fehler: ' + (e && e.message || e)); });
}

function computeDaily(points, startDay, nDays) {
    var cum = new Array(nDays), baseline = points.length ? points[0].val : 0;
    for (var i = 0; i < points.length; i++) { if (points[i].ts < startDay) baseline = points[i].val; }
    points.forEach(function (p) {
        var di = Math.floor((p.ts - startDay) / 86400000);
        if (di >= 0 && di < nDays) cum[di] = p.val; // letzter Wert des Tages gewinnt (Punkte aufsteigend)
    });
    var out = [], last = baseline;
    for (var dI = 0; dI < nDays; dI++) {
        if (cum[dI] == null) out.push({ day: startDay + dI * 86400000, val: 0, cum: last });
        else { out.push({ day: startDay + dI * 86400000, val: cum[dI] - last, cum: cum[dI] }); last = cum[dI]; }
    }
    return out;
}

function drawBars(daily, startDay) {
    var s = sizeCanvas(document.getElementById('chart')), ctx = s.ctx, W = s.w, H = s.h;
    sizeCanvas(crossCanvas).ctx.clearRect(0, 0, W, H);
    ctx.clearRect(0, 0, W, H);
    var css = getComputedStyle(document.documentElement);
    var muted = css.getPropertyValue('--muted').trim() || '#777', border = css.getPropertyValue('--border').trim() || '#ddd';
    var padL = 60, padR = 18, padT = 14, padB = 36, plotW = W - padL - padR, plotH = H - padT - padB;
    var maxAbs = 0.5, hasNeg = false;
    daily.forEach(function (x) { if (Math.abs(x.val) > maxAbs) maxAbs = Math.abs(x.val); if (x.val < 0) hasNeg = true; });
    var hi = niceCeil(maxAbs), lo = hasNeg ? -hi : 0;
    var yv = function (v) { return padT + (hi - Math.max(lo, Math.min(hi, v))) / (hi - lo) * plotH; };
    var zeroY = yv(0);
    ctx.font = '11px Segoe UI, Arial'; ctx.textBaseline = 'middle';
    for (var i = 0; i <= 4; i++) {
        var yy = padT + plotH * i / 4, val = hi - (hi - lo) * i / 4;
        ctx.strokeStyle = border; ctx.beginPath(); ctx.moveTo(padL, yy); ctx.lineTo(padL + plotW, yy); ctx.stroke();
        ctx.fillStyle = muted; ctx.textAlign = 'right'; ctx.fillText(val.toFixed(2) + ' €', padL - 6, yy);
    }
    var n = daily.length, bw = Math.max(2, plotW / n * 0.7), everyN = Math.ceil(n / 10);
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    daily.forEach(function (x, i) {
        var cx = padL + plotW * (i + 0.5) / n, y = yv(x.val);
        ctx.fillStyle = x.val >= 0 ? '#4caf50' : '#e57373';
        ctx.fillRect(cx - bw / 2, Math.min(y, zeroY), bw, Math.abs(y - zeroY));
        if (i % everyN === 0) { ctx.fillStyle = muted; ctx.fillText(ddmm(x.day), cx, padT + plotH + 5); }
    });
    ctx.strokeStyle = muted; ctx.beginPath(); ctx.moveTo(padL, zeroY); ctx.lineTo(padL + plotW, zeroY); ctx.stroke();
    ctx.strokeStyle = border; ctx.strokeRect(padL, padT, plotW, plotH);
}

// ---- Prognose: kumulierte Ersparnis vs. Investition ---------------------------------------
function refreshForecast() {
    setStatus('Berechne Prognose…');
    fetchConfig().then(function () {
        return Promise.all([getStateVal('economics.savingsTotal.eur'), getStateVal('economics._startTs')]);
    }).then(function (v) {
        var total = v[0] || 0, startTs = v[1] || Date.now();
        var yearsElapsed = (Date.now() - startTs) / (365.25 * 86400000);
        var annual = yearsElapsed > 0 ? total / yearsElapsed : 0;
        drawForecast(annual, investmentEur);
        if (annual > 0 && investmentEur > 0) {
            var be = investmentEur / annual, rows = [];
            for (var y = 0; y <= Math.min(Math.ceil(be) + 2, 40); y++) {
                rows.push([y + '', fmt(annual * y, 0, ' €'), (annual * y >= investmentEur ? '✓ erreicht' : fmt(investmentEur - annual * y, 0, ' €'))]);
            }
            renderRows(['Jahr', 'kum. Ersparnis', 'Rest bis Amort.'], rows, false);
            setStatus('Hochrechnung: ' + fmt(annual, 0, ' €/Jahr') + ' → Amortisation in ~' + fmt(be, 1, ' Jahren'));
        } else {
            renderRows(['Jahr', 'kum. Ersparnis', 'Rest'], [], false);
            setStatus('Stand: ' + new Date().toLocaleTimeString());
        }
        return loadKpis();
    }).catch(function (e) { setStatus('Fehler: ' + (e && e.message || e)); });
}

function drawForecast(annual, invest) {
    var s = sizeCanvas(document.getElementById('chart')), ctx = s.ctx, W = s.w, H = s.h;
    sizeCanvas(crossCanvas).ctx.clearRect(0, 0, W, H);
    ctx.clearRect(0, 0, W, H);
    if (!(annual > 0)) {
        showOverlay('Noch keine positive Jahresersparnis – die Prognose erscheint, sobald der Speicher netto spart (meist nach einigen Tagen Lauf inkl. Entladephasen).');
        return;
    }
    showOverlay('');
    var css = getComputedStyle(document.documentElement);
    var muted = css.getPropertyValue('--muted').trim() || '#777', border = css.getPropertyValue('--border').trim() || '#ddd';
    var be = invest > 0 ? invest / annual : 0;
    var maxYears = Math.min(Math.max(Math.ceil(be * 1.3), 5), 40);
    var yMax = niceCeil(Math.max(invest, annual * maxYears));
    var padL = 64, padR = 18, padT = 14, padB = 30, plotW = W - padL - padR, plotH = H - padT - padB;
    var xp = function (yr) { return padL + yr / maxYears * plotW; };
    var yp = function (e) { return padT + (yMax - Math.max(0, Math.min(yMax, e))) / yMax * plotH; };
    ctx.font = '11px Segoe UI, Arial'; ctx.textBaseline = 'middle';
    for (var i = 0; i <= 4; i++) {
        var yy = padT + plotH * i / 4, val = yMax * (1 - i / 4);
        ctx.strokeStyle = border; ctx.beginPath(); ctx.moveTo(padL, yy); ctx.lineTo(padL + plotW, yy); ctx.stroke();
        ctx.fillStyle = muted; ctx.textAlign = 'right'; ctx.fillText(Math.round(val) + ' €', padL - 6, yy);
    }
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    for (var yr = 0; yr <= maxYears; yr++) {
        var xx = xp(yr); ctx.strokeStyle = border; ctx.beginPath(); ctx.moveTo(xx, padT); ctx.lineTo(xx, padT + plotH); ctx.stroke();
        ctx.fillStyle = muted; ctx.fillText(yr + ' J', xx, padT + plotH + 5);
    }
    if (invest > 0) {
        ctx.strokeStyle = '#e57373'; ctx.setLineDash([5, 4]); ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(padL, yp(invest)); ctx.lineTo(padL + plotW, yp(invest)); ctx.stroke(); ctx.setLineDash([]);
        ctx.fillStyle = '#e57373'; ctx.textAlign = 'left'; ctx.textBaseline = 'bottom'; ctx.fillText('Investition ' + Math.round(invest) + ' €', padL + 4, yp(invest) - 3);
    }
    ctx.strokeStyle = '#4caf50'; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.moveTo(xp(0), yp(0)); ctx.lineTo(xp(maxYears), yp(annual * maxYears)); ctx.stroke();
    if (be > 0 && be <= maxYears) {
        ctx.fillStyle = '#4caf50'; ctx.beginPath(); ctx.arc(xp(be), yp(invest), 5, 0, 2 * Math.PI); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
        ctx.fillStyle = muted; ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.fillText('Amortisation ~' + be.toFixed(1) + ' J', xp(be), yp(invest) + 8);
    }
    ctx.strokeStyle = border; ctx.lineWidth = 1; ctx.strokeRect(padL, padT, plotW, plotH);
}

// ---- generische Tabelle (Monat / Prognose) ------------------------------------------------
function renderRows(headers, rows, highlightLast) {
    document.querySelector('#tbl thead').innerHTML = '<tr>' + headers.map(function (h) { return '<th>' + h + '</th>'; }).join('') + '</tr>';
    document.querySelector('#tbl tbody').innerHTML = rows.map(function (r, i) {
        var cls = (highlightLast && i === rows.length - 1) ? ' class="hl"' : '';
        return '<tr' + cls + '>' + r.map(function (c) { return '<td>' + c + '</td>'; }).join('') + '</tr>';
    }).join('');
    document.getElementById('tblInfo').textContent = rows.length ? (rows.length + ' Zeilen') : '';
}

function ddmm(ts) { var d = new Date(ts); return pad2(d.getDate()) + '.' + pad2(d.getMonth() + 1) + '.'; }
function setDayInput(d) { document.getElementById('day').value = d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()); }
function shiftDay(delta) { var el = document.getElementById('day'); var d = el.value ? new Date(el.value + 'T00:00:00') : new Date(); d.setDate(d.getDate() + delta); setDayInput(d); refresh(); }

function selectedDayIsToday() {
    var v = document.getElementById('day').value;
    var t = new Date();
    return !v || v === (t.getFullYear() + '-' + pad2(t.getMonth() + 1) + '-' + pad2(t.getDate()));
}

// Ersparnis des angezeigten Tages: heute live aus savingsToday, sonst aus der
// savingsTotal-Historie (Differenz Tagesende − Tagesanfang).
function daySavings() {
    if (periodMode !== 'tag' || selectedDayIsToday()) {
        return getStateVal('economics.savingsToday.eur').then(function (v) {
            return { val: v, label: 'Ersparnis heute' };
        });
    }
    var b = dayBounds();
    var qEnd = Math.min(b.end, Date.now());
    return getHistory('economics.savingsTotal.eur', b.start - 86400000, qEnd).then(function (pts) {
        var label = 'Ersparnis (' + ddmm(b.start) + ')';
        if (!pts.length) return { val: null, label: label };
        var cumStart = stepVal(pts, b.start);
        if (cumStart === null) cumStart = pts[0].val;
        var cumEnd = stepVal(pts, qEnd);
        var val = (cumEnd !== null && cumStart !== null) ? cumEnd - cumStart : null;
        return { val: val, label: label };
    });
}

function loadKpis() {
    return Promise.all([
        getStateVal('battery.soc.percent'), daySavings(),
        getStateVal('grid.importOriginalToday.kWh'), getStateVal('grid.importSimulatedToday.kWh'),
        getStateVal('economics.savingsTotal.eur'), getStateVal('economics.amortizationYears'),
        getStateVal('battery.chargedToday.kWh'), getStateVal('battery.dischargedToday.kWh'),
        getStateVal('economics.batteryCoverageToday.percent'), getStateVal('battery.dischargedTotal.kWh')
    ]).then(function (v) {
        var saved = (v[2] != null && v[3] != null) ? Math.max(v[2] - v[3], 0) : null;
        var cycles = (v[9] != null && capacityKwh > 0) ? v[9] / capacityKwh : null;
        var kpis = [
            { label: 'Ladestand', value: fmt(v[0], 0, ' %') },
            { label: v[1].label, value: fmt(v[1].val, 2, ' €') },
            { label: 'Ersparnis gesamt', value: fmt(v[4], 2, ' €') },
            { label: 'Netzbezug heute', value: fmt(v[3], 1, ' kWh'), sub: saved != null ? ('−' + saved.toFixed(1) + ' kWh ggü. ohne Speicher') : '' },
            { label: 'Speicher-Deckung heute', value: fmt(v[8], 0, ' %') },
            { label: 'Geladen / Entladen heute', value: fmt(v[6], 1, '') + ' / ' + fmt(v[7], 1, ' kWh') },
            { label: 'Vollzyklen (gesamt)', value: cycles != null ? fmt(cycles, 1, '') : '–' },
            { label: 'Amortisation', value: v[5] ? fmt(v[5], 1, ' J') : '–' }
        ];
        document.getElementById('kpis').innerHTML = kpis.map(function (k) {
            return '<div class="kpi"><div class="label">' + k.label + '</div><div class="value">' + k.value +
                '</div>' + (k.sub ? '<div class="sub">' + k.sub + '</div>' : '') + '</div>';
        }).join('');
    });
}

function fmt(v, dec, unit) { return v == null ? '–' : v.toFixed(dec).replace('.', ',') + (unit || ''); }
function pad2(n) { return (n < 10 ? '0' : '') + n; }
function hhmm(ts) { var d = new Date(ts); return pad2(d.getHours()) + ':' + pad2(d.getMinutes()); }

// ---- Daten zusammenführen (für Tabelle + Hover) -------------------------------------------
// Letzter bekannter Wert zum Zeitpunkt ts (Carry-forward). Daten sind aufsteigend sortiert.
// Vor dem ersten Punkt: null. So spiegelt jede Zeile genau EINEN Tick wider -> Bezug/Einspeisung schliessen sich aus.
function stepVal(data, ts) {
    if (!data || !data.length || data[0].ts > ts) return null;
    var lo = 0, hi = data.length - 1, res = null;
    while (lo <= hi) { var mid = (lo + hi) >> 1; if (data[mid].ts <= ts) { res = data[mid].val; lo = mid + 1; } else hi = mid - 1; }
    return res;
}
function buildMerged(cfg) {
    var series = cfg.areas.concat(cfg.lines), ref = null;
    series.forEach(function (s) { if (!ref || (s.data && s.data.length > ref.data.length)) ref = s; });
    if (!ref || !ref.data.length) return [];
    return ref.data.map(function (p) {
        var vals = {}; series.forEach(function (s) { vals[s.path] = stepVal(s.data, p.ts); });
        return { ts: p.ts, vals: vals };
    });
}

function renderTable(cfg, rows) {
    var series = cfg.areas.concat(cfg.lines).filter(function (s) { return !isHidden(s); });
    document.querySelector('#tbl thead').innerHTML = '<tr><th>Zeit</th>' +
        series.map(function (s) { return '<th>' + s.short + '<br><span style="font-weight:400">' + s.unit + '</span></th>'; }).join('') + '</tr>';
    var step = Math.max(1, Math.ceil(rows.length / 48));
    var sel = [];
    for (var i = 0; i < rows.length; i += step) sel.push(rows[i]);
    if (rows.length && sel[sel.length - 1] !== rows[rows.length - 1]) sel.push(rows[rows.length - 1]);
    tableRows = sel;
    document.querySelector('#tbl tbody').innerHTML = sel.map(function (r) {
        return '<tr data-ts="' + r.ts + '"><td>' + hhmm(r.ts) + '</td>' + series.map(function (s) {
            var v = r.vals[s.path]; var d = (v == null) ? null : (s.negate ? -v : v);
            return '<td>' + (d == null ? '–' : Math.round(d)) + '</td>';
        }).join('') + '</tr>';
    }).join('');
    document.getElementById('tblInfo').textContent = sel.length ? (sel.length + ' Zeilen') : '';
}

// ---- Chart ---------------------------------------------------------------------------------
function niceCeil(v) {
    if (v <= 0) return 100;
    var mag = Math.pow(10, Math.floor(Math.log10(v))), n = v / mag;
    return (n <= 1 ? 1 : n <= 2 ? 2 : n <= 5 ? 5 : 10) * mag;
}
function sizeCanvas(cv) {
    var dpr = window.devicePixelRatio || 1, w = cv.clientWidth, h = cv.clientHeight;
    cv.width = w * dpr; cv.height = h * dpr;
    var ctx = cv.getContext('2d'); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    return { ctx: ctx, w: w, h: h };
}
function xPixG(ts) { return geom.padL + (ts - geom.x0) / (geom.x1 - geom.x0) * geom.plotW; }
function yG(series, val) {
    if (series && series.axis === 'right') return geom.padT + geom.plotH - Math.max(0, Math.min(val, 100)) / 100 * geom.plotH;
    var v = (series && series.negate) ? -val : val;       // Einspeisung nach unten
    v = Math.max(geom.lo, Math.min(geom.hi, v));
    return geom.padT + (geom.hi - v) / (geom.hi - geom.lo) * geom.plotH;
}

function drawChart(cfg, x0, x1) {
    window._lastCfg = cfg; window._lastB = { start: x0, end: x1 };
    var s = sizeCanvas(document.getElementById('chart')), ctx = s.ctx, cssW = s.w, cssH = s.h;
    sizeCanvas(crossCanvas); // gleiche Größe fürs Overlay
    ctx.clearRect(0, 0, cssW, cssH);

    var css = getComputedStyle(document.documentElement);
    var muted = css.getPropertyValue('--muted').trim() || '#777';
    var border = css.getPropertyValue('--border').trim() || '#ddd';

    var padL = 55, padR = 45, padT = 12, padB = 26;
    var plotW = cssW - padL - padR, plotH = cssH - padT - padB;
    if (plotW <= 0 || plotH <= 0) return;

    // Zeichenreihe je Serie (optional geglättet); Tabelle/Hover nutzen weiter die Rohdaten.
    cfg.areas.concat(cfg.lines).forEach(function (sr) { sr._draw = smoothOn ? smoothData(sr.data, 5) : sr.data; });

    var maxAbs = 100, hasNeg = false;
    function consider(v) { if (Math.abs(v) > maxAbs) maxAbs = Math.abs(v); if (v < -1e-9) hasNeg = true; }
    cfg.areas.forEach(function (sr) { if (isHidden(sr)) return; sr._draw.forEach(function (p) { consider(sr.negate ? -p.val : p.val); }); });
    cfg.lines.forEach(function (sr) { if (isHidden(sr) || sr.axis === 'right') return; sr._draw.forEach(function (p) { consider(p.val); }); });
    var hi = niceCeil(maxAbs), lo = hasNeg ? -hi : 0;

    geom = { padL: padL, padT: padT, plotW: plotW, plotH: plotH, x0: x0, x1: x1, lo: lo, hi: hi, leftMax: hi };
    geom.zeroY = padT + (hi - 0) / (hi - lo) * plotH;

    ctx.fillStyle = muted; ctx.lineWidth = 1; ctx.font = '11px Segoe UI, Arial'; ctx.textBaseline = 'middle';
    for (var i = 0; i <= 4; i++) {
        var yy = padT + plotH * i / 4;
        var wv = hi - (hi - lo) * i / 4;
        var isZero = hasNeg && Math.abs(wv) < 1e-6;
        ctx.strokeStyle = isZero ? muted : border; ctx.lineWidth = isZero ? 1.4 : 1;
        ctx.beginPath(); ctx.moveTo(padL, yy); ctx.lineTo(padL + plotW, yy); ctx.stroke();
        ctx.fillStyle = muted;
        ctx.textAlign = 'right'; ctx.fillText(Math.round(wv) + ' W', padL - 6, yy);
        ctx.textAlign = 'left'; ctx.fillText(Math.round(100 * (1 - i / 4)) + '%', padL + plotW + 6, yy);
    }
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    for (var h = 0; h <= 24; h += 3) {
        var xx = padL + plotW * h / 24;
        ctx.beginPath(); ctx.moveTo(xx, padT); ctx.lineTo(xx, padT + plotH); ctx.strokeStyle = border; ctx.stroke();
        ctx.fillStyle = muted; ctx.fillText(pad2(h) + ':00', xx, padT + plotH + 5);
    }

    cfg.areas.forEach(function (sr) {
        if (isHidden(sr) || !sr._draw.length) return;
        if (sr.splitSign) { drawSplitArea(ctx, sr); return; }
        var dd = sr._draw;
        ctx.beginPath(); ctx.moveTo(xPixG(dd[0].ts), yG({}, 0));
        dd.forEach(function (p) { ctx.lineTo(xPixG(p.ts), yG(sr, p.val)); });
        ctx.lineTo(xPixG(dd[dd.length - 1].ts), yG({}, 0)); ctx.closePath();
        ctx.fillStyle = sr.color; ctx.fill();
        if (sr.stroke) { ctx.strokeStyle = sr.stroke; ctx.lineWidth = 1.2; ctx.beginPath();
            dd.forEach(function (p, k) { var X = xPixG(p.ts), Y = yG(sr, p.val); k ? ctx.lineTo(X, Y) : ctx.moveTo(X, Y); }); ctx.stroke(); }
    });
    cfg.lines.forEach(function (sr) {
        if (isHidden(sr) || !sr._draw.length) return;
        ctx.strokeStyle = sr.color; ctx.lineWidth = 2; ctx.beginPath();
        sr._draw.forEach(function (p, k) { var X = xPixG(p.ts), Y = yG(sr, p.val); k ? ctx.lineTo(X, Y) : ctx.moveTo(X, Y); }); ctx.stroke();
    });
    ctx.strokeStyle = border; ctx.lineWidth = 1; ctx.strokeRect(padL, padT, plotW, plotH);
}

// Eine vorzeichenbehaftete Saldo-Reihe als zwei Flächen: positiv (Bezug) rot, negativ (Einspeisung) blau.
function drawSplitArea(ctx, sr) {
    var dd = sr._draw || sr.data;
    [[function (v) { return Math.max(v, 0); }, sr.posColor], [function (v) { return Math.min(v, 0); }, sr.negColor]].forEach(function (part) {
        var clamp = part[0];
        ctx.beginPath(); ctx.moveTo(xPixG(dd[0].ts), geom.zeroY);
        dd.forEach(function (p) { ctx.lineTo(xPixG(p.ts), yG({}, clamp(p.val))); });
        ctx.lineTo(xPixG(dd[dd.length - 1].ts), geom.zeroY); ctx.closePath();
        ctx.fillStyle = part[1]; ctx.fill();
    });
}

function legColor(s) {
    if (s.splitSign) return 'linear-gradient(to bottom,' + s.posStroke + ' 50%,' + s.negStroke + ' 50%)';
    return s.stroke || s.color;
}
function renderLegend(cfg) {
    var all = cfg.areas.concat(cfg.lines);
    document.getElementById('legend').innerHTML = all.map(function (s) {
        return '<span class="leg' + (isHidden(s) ? ' off' : '') + '" data-path="' + s.path + '">' +
            '<i class="swatch" style="background:' + legColor(s) + '"></i>' + s.name + '</span>';
    }).join('');
}

function applyVisibility() {
    if (!curCfg || !window._lastB) return;
    drawChart(curCfg, window._lastB.start, window._lastB.end);
    renderTable(curCfg, merged);
    renderLegend(curCfg);
    onLeave();
}

// Voreinstellung der Sichtbarkeit nach Szenario (Vergleich / nur mit / nur ohne Speicher)
function applyViewMode(mode) {
    if (!curCfg) return;
    curCfg.areas.concat(curCfg.lines).forEach(function (s) {
        if (mode === 'mit') hiddenSet[s.path] = (s.scen === 'orig');
        else if (mode === 'ohne') hiddenSet[s.path] = (s.scen === 'sim');
        else delete hiddenSet[s.path];
    });
}
function showOverlay(text) { document.getElementById('overlay').textContent = text || ''; }

// ---- Hover / Crosshair --------------------------------------------------------------------
function nearestMergedIdx(ts) {
    var best = 0, bd = Infinity;
    for (var i = 0; i < merged.length; i++) { var d = Math.abs(merged[i].ts - ts); if (d < bd) { bd = d; best = i; } }
    return best;
}
function onMove(e) {
    if (periodMode !== 'tag' || !geom || !merged.length || !curCfg) return;
    var rect = wrap.getBoundingClientRect();
    var cssX = e.clientX - rect.left;
    if (cssX < geom.padL || cssX > geom.padL + geom.plotW) { onLeave(); return; }
    var ts = geom.x0 + (cssX - geom.padL) / geom.plotW * (geom.x1 - geom.x0);
    var m = merged[nearestMergedIdx(ts)];
    drawCross(m);
    showTip(m, rect);
    highlightRow(m.ts);
}
function drawCross(m) {
    var s = sizeCanvas(crossCanvas), ctx = s.ctx;
    ctx.clearRect(0, 0, s.w, s.h);
    var X = xPixG(m.ts);
    ctx.strokeStyle = 'rgba(128,128,128,0.7)'; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
    ctx.beginPath(); ctx.moveTo(X, geom.padT); ctx.lineTo(X, geom.padT + geom.plotH); ctx.stroke();
    ctx.setLineDash([]);
    curCfg.areas.concat(curCfg.lines).forEach(function (sr) {
        if (isHidden(sr)) return;
        var v = m.vals[sr.path]; if (v == null) return;
        var Y = yG(sr, v);
        ctx.fillStyle = sr.splitSign ? (v >= 0 ? sr.posStroke : sr.negStroke) : (sr.stroke || sr.color);
        ctx.beginPath(); ctx.arc(X, Y, 3.5, 0, 2 * Math.PI); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
    });
}
function showTip(m, rect) {
    var series = curCfg.areas.concat(curCfg.lines).filter(function (s) { return !isHidden(s); });
    var html = '<div class="t-time">' + hhmm(m.ts) + ' Uhr</div>' + series.map(function (sr) {
        var v = m.vals[sr.path]; var d = (v == null) ? null : (sr.negate ? -v : v);
        var col = sr.splitSign ? ((d || 0) >= 0 ? sr.posStroke : sr.negStroke) : (sr.stroke || sr.color);
        return '<div class="t-row"><i class="swatch" style="width:10px;height:10px;background:' + col +
            '"></i>' + sr.name + ': <b>' + (d == null ? '–' : Math.round(d) + ' ' + sr.unit) + '</b></div>';
    }).join('');
    tipEl.innerHTML = html;
    tipEl.style.display = 'block';
    var X = xPixG(m.ts);
    var tw = tipEl.offsetWidth;
    var left = X + 14; if (left + tw > rect.width) left = X - tw - 14;
    tipEl.style.left = Math.max(4, left) + 'px';
    tipEl.style.top = (geom.padT + 6) + 'px';
}
function highlightRow(ts) {
    var rows = document.querySelectorAll('#tbl tbody tr');
    if (!rows.length) return;
    var best = null, bd = Infinity;
    rows.forEach(function (tr) { var d = Math.abs(parseInt(tr.getAttribute('data-ts'), 10) - ts); if (d < bd) { bd = d; best = tr; } });
    rows.forEach(function (tr) { tr.classList.remove('hl'); });
    if (best) { best.classList.add('hl'); best.scrollIntoView({ block: 'nearest' }); }
}
function onLeave() {
    if (crossCanvas) { var s = sizeCanvas(crossCanvas); s.ctx.clearRect(0, 0, s.w, s.h); }
    if (tipEl) tipEl.style.display = 'none';
    if (periodMode === 'tag') document.querySelectorAll('#tbl tbody tr.hl').forEach(function (tr) { tr.classList.remove('hl'); });
}

// ---- Events --------------------------------------------------------------------------------
window.addEventListener('DOMContentLoaded', function () {
    wrap = document.querySelector('.chart-wrap');
    crossCanvas = document.getElementById('cross');
    tipEl = document.getElementById('tip');
    wrap.addEventListener('mousemove', onMove);
    wrap.addEventListener('mouseleave', onLeave);

    document.getElementById('instance').addEventListener('change', function (e) { curInst = parseInt(e.target.value, 10); refresh(); });
    document.getElementById('day').addEventListener('change', refresh);
    document.getElementById('reload').addEventListener('click', refresh);
    document.getElementById('view').addEventListener('change', function (e) { applyViewMode(e.target.value); applyVisibility(); });
    document.getElementById('smooth').addEventListener('change', function (e) { smoothOn = e.target.checked; if (periodMode === 'tag') applyVisibility(); });
    document.getElementById('period').addEventListener('change', function (e) { periodMode = e.target.value; onLeave(); refresh(); });
    document.getElementById('dayPrev').addEventListener('click', function () { shiftDay(-1); });
    document.getElementById('dayNext').addEventListener('click', function () { shiftDay(1); });
    document.getElementById('dayToday').addEventListener('click', function () { setDayInput(new Date()); refresh(); });
    document.getElementById('legend').addEventListener('click', function (e) {
        var sp = e.target.closest('span.leg'); if (!sp) return;
        var p = sp.getAttribute('data-path'); hiddenSet[p] = !hiddenSet[p]; applyVisibility();
    });
    window.addEventListener('resize', function () {
        if (periodMode === 'tag') { if (window._lastCfg) drawChart(window._lastCfg, window._lastB.start, window._lastB.end); }
        else refresh();
    });

    setDayInput(new Date());

    connect();
    refreshTimer = setInterval(function () { if (socket && socket.connected) refresh(); }, 60000);
});
</script>
